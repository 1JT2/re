<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录 - XUST医院云平台</title>
  <style>
    :root { --max: 980px; }
    *{ box-sizing:border-box; }
    body{ margin:0; font-family: Arial, sans-serif; background:#f6f7f9; color:#111; }
    .topbar{ background:#fff; border-bottom:1px solid #e7e7e7; }
    .topbar .wrap{ max-width:var(--max); margin:0 auto; padding:14px 16px; display:flex; justify-content:space-between; gap:12px; align-items:center; }
    .wrap{ max-width:var(--max); margin:0 auto; padding:16px; }
    .card{ background:#fff; border:1px solid #e7e7e7; border-radius:12px; padding:16px; box-shadow:0 2px 10px rgba(0,0,0,.04); }
    .grid{ display:grid; grid-template-columns:1fr; gap:12px; }
    @media (min-width: 720px){ .grid{ grid-template-columns:1fr 1fr; } }
    label{ display:block; font-size:12px; color:#555; margin-bottom:6px; }
    input{ width:100%; padding:10px 12px; border:1px solid #d1d5db; border-radius:10px; }
    button{ width:100%; padding:10px 12px; border-radius:10px; border:1px solid #111; background:#111; color:#fff; cursor:pointer; }
    .small{ font-size:12px; color:#555; }
    .err{ font-size:12px; color:#b00020; margin-top:10px; }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="wrap">
      <div><b>XUST医院云平台</b></div>
      <div class="small">登录</div>
    </div>
  </div>

  <div class="wrap">
    <div class="card" style="max-width:560px;margin:18px auto;">
      <h2 style="margin:0 0 12px 0;">登录</h2>

      <div class="grid">
        <div>
          <label>用户名</label>
          <input id="username" placeholder="例如 doctor / patient" />
        </div>
        <div>
          <label>密码</label>
          <input id="password" type="password" placeholder="例如 123456" />
        </div>
      </div>

      <div style="margin-top:12px;">
        <button id="btnLogin">登录并进入报告</button>
      </div>

      <div class="small" style="margin-top:10px;">
        演示账号：<b>doctor</b> / <b>123456</b>（医生，可提交云端）<br>
        演示账号：<b>patient</b> / <b>123456</b>（患者，只读自动刷新）
      </div>
      <div id="err" class="err"></div>
    </div>
  </div>

  <script>
    const ACCOUNTS = [
      { username: "doctor", password: "123456", role: "doctor" },
      { username: "patient", password: "123456", role: "patient" }
    ];

    document.getElementById("btnLogin").onclick = () => {
      const u = document.getElementById("username").value.trim();
      const p = document.getElementById("password").value;
      const params = new URLSearchParams(window.location.search);
      const code = params.get("code") || "001";

      const hit = ACCOUNTS.find(x => x.username === u && x.password === p);
      if (!hit) {
        document.getElementById("err").textContent = "用户名或密码错误";
        return;
      }

      try{
        localStorage.setItem("logged_in", "1");
        localStorage.setItem("role", hit.role);
      }catch(e){}

      window.location.assign(`./report.html?code=${encodeURIComponent(code)}`);
    };
  </script>
</body>
</html>
