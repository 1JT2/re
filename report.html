<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>医学影像诊断报告</title>
  <style>
    :root { --max: 1100px; }
    *{ box-sizing:border-box; }
    body{ margin:0; font-family: Arial, sans-serif; background:#f6f7f9; color:#111; }
    .topbar{ background:#fff; border-bottom:1px solid #e7e7e7; }
    .topbar .wrap{ max-width:var(--max); margin:0 auto; padding:14px 16px; display:flex; justify-content:space-between; gap:12px; align-items:center; }
    .wrap{ max-width:var(--max); margin:0 auto; padding:16px; }
    .btn{ padding:8px 10px; border-radius:10px; border:1px solid #d1d5db; background:#fff; cursor:pointer; }
    .btn:hover{ background:#f3f7fb; }
    .badge{ font-size:12px; padding:4px 8px; border-radius:999px; background:#f1f1f1; }
    .grid2{ display:grid; grid-template-columns: 1fr; gap:12px; }
    @media (min-width: 900px){ .grid2{ grid-template-columns: 1.35fr 0.65fr; } }

    .card{ background:#fff; border:1px solid #e7e7e7; border-radius:12px; padding:14px 12px; box-shadow:0 2px 10px rgba(0,0,0,.04); }
    h1,h2{ margin:0; }
    .hblock{ text-align:center; padding:8px 0; }
    .info-line{ margin:6px 0; display:flex; gap:10px; flex-wrap:wrap; }
    .info-line strong{ min-width:110px; color:#555; font-weight:700; }
    .textblock{ white-space:pre-wrap; line-height:1.55; }
    .small{ font-size:12px; color:#555; }

    .imgbox{
      width:100%;
      aspect-ratio: 4/3;
      border:1px dashed #c6cdd6;
      border-radius:10px;
      background:#f6f8fa;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      position:relative;
    }
    .imgbox img{
      width:100%;
      height:100%;
      object-fit:contain;
      display:block;
    }

    /* 统一按钮区域：等宽、均匀，自适应 */
    .toolrow{
      display:grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap:8px;
      margin-top:10px;
    }
    @media (max-width: 480px){
      .toolrow{ grid-template-columns: 1fr; }
    }

    /* file input 伪装成按钮 */
    .filebtn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      border:1px solid #d1d5db;
      border-radius:10px;
      background:#fff;
      cursor:pointer;
      padding:8px 10px;
      user-select:none;
      width:100%;
    }
    .filebtn:hover{ background:#f3f7fb; }
    .filebtn input{ display:none; }

    /* 二维码展示框 */
    .qrbox{
      width:100%;
      aspect-ratio: 1/1;
      border:1px dashed #c6cdd6;
      border-radius:10px;
      background:#f6f8fa;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
    }
    .qrbox img{ width:100%; height:100%; object-fit:contain; display:block; }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="wrap">
      <div><b>XUST医院云平台</b> <span class="badge">医学影像报告</span></div>
      <div>
        <button class="btn" id="btnLogout">退出</button>
      </div>
    </div>
  </div>

  <div class="wrap">
    <div class="hblock">
      <h2>医学影像诊断报告</h2>
      <!-- <div class="small">说明：该页面为毕业设计演示版（前端自适应布局）</div> -->
    </div>

    <div class="grid2">
      <!-- 左：信息 -->
      <div style="display:flex;flex-direction:column;gap:12px;">
        <div class="card">
          <div class="info-line"><strong>就诊号：</strong><span id="patient-id"></span></div>
          <div class="info-line"><strong>报告号：</strong><span id="report-id"></span></div>
          <div class="info-line"><strong>检查日期：</strong><span id="exam-date"></span></div>
        </div>

        <div class="card">
          <div class="info-line"><strong>患者：</strong><span id="patient-name"></span></div>
          <div class="info-line"><strong>性别/年龄：</strong><span id="gender-age"></span></div>
          <div class="info-line"><strong>主治医生：</strong><span id="doctor-name"></span></div>
          <div class="info-line"><strong>科室：</strong><span id="department"></span></div>
        </div>

        <div class="card">
          <div class="info-line"><strong>影像信息：</strong><span id="image-meta"></span></div>
          <div class="info-line"><strong>检查部位：</strong><span id="body-part"></span></div>
        </div>

        <div class="card">
          <div class="info-line"><strong>诊断证明：</strong></div>
          <div class="textblock" id="diagnosis-proof"></div>
        </div>

        <div class="card">
          <div class="info-line"><strong>医嘱：</strong></div>
          <div class="textblock" id="medical-advice"></div>
        </div>
      </div>

      <!-- 右：医学图像展示 + QR码展示 -->
      <div style="display:flex;flex-direction:column;gap:12px;">
        <div class="card">
          <div style="display:flex;justify-content:space-between;gap:10px;align-items:center;">
            <div><b>医学图像展示</b></div>
            <div class="small">支持上传本地图片预览</div>
          </div>

          <div class="imgbox" id="imgbox">
            <span class="small">未加载图像（可上传医学图像水印系统输出的医学图像）</span>
          </div>

          <!-- 医学图像按钮：选择/清除/下载 -->
          <div class="toolrow">
            <label class="filebtn">
              选择文件
              <input type="file" id="fileInput" accept="image/*"/>
            </label>
            <button class="btn" id="btnClearImg">清除图像</button>
            <button class="btn" id="btnDownloadImg">下载图像</button>
          </div>

          <hr style="border:none;border-top:1px solid #eee;margin:12px 0;">

          <!-- 二维码展示区 -->
          <div style="display:flex;justify-content:space-between;gap:10px;align-items:center;">
            <div><b>访问二维码展示</b></div>
            <div class="small">将当前网址编码为QR码</div>
          </div>

          <div class="qrbox" id="qrbox">
            <span class="small">未生成二维码</span>
          </div>

          <!-- 二维码按钮：生成/下载（两列均匀） -->
          <div class="toolrow" style="grid-template-columns:1fr 1fr;margin-top:10px;">
            <button class="btn" id="btnGenQR">生成图像</button>
            <button class="btn" id="btnDownloadQR">下载图像</button>
          </div>

          <div class="small" style="margin-top:10px;color:#555;">
            备注：真实系统中可对接 DICOM Viewer 或展示关键图/水印图。
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // 登录拦截（演示级）
    if (localStorage.getItem("logged_in") !== "1") {
      window.location.href = "login.html";
    }

    document.getElementById("btnLogout").onclick = () => {
      localStorage.removeItem("logged_in");
      window.location.href = "login.html";
    };

    // 演示数据：按 code 生成不同信息
    const urlParams = new URLSearchParams(window.location.search);
    const code = urlParams.get('code') || "001";

    document.getElementById("patient-id").innerText = `P-${code}`;
    document.getElementById("report-id").innerText = `R-${code}`;
    document.getElementById("exam-date").innerText = "2025-07-10";

    document.getElementById("patient-name").innerText = `患者${code}`;
    document.getElementById("gender-age").innerText = "男 / 45";
    document.getElementById("doctor-name").innerText = `张医生（工号 D-${code}）`;
    document.getElementById("department").innerText = "胸外科";

    document.getElementById("image-meta").innerText = `CT，分辨率 512×512`;
    document.getElementById("body-part").innerText = "胸部";

    document.getElementById("diagnosis-proof").innerText =
`1）影像所见：未见明显占位性病变。
2）诊断意见：建议结合临床症状随访。
3）说明：本报告为演示内容。`;

    document.getElementById("medical-advice").innerText =
`建议：
- 规律复查（3个月）
- 若出现胸闷/咳嗽加重，及时就诊
- 遵医嘱用药`;

    // -----------------------------
    // 医学图像：上传预览 / 清除 / 下载
    // -----------------------------
    const fileInput = document.getElementById("fileInput");
    const imgbox = document.getElementById("imgbox");
    let currentImgUrl = null;       // Object URL
    let currentImgName = "medical_image.png";

    function setImgPlaceholder(){
      imgbox.innerHTML = '<span class="small">未加载图像（可上传医学图像水印系统输出的医学图像）</span>';
    }

    fileInput.addEventListener("change", () => {
      const file = fileInput.files && fileInput.files[0];
      if (!file) return;

      if (currentImgUrl) URL.revokeObjectURL(currentImgUrl);
      currentImgUrl = URL.createObjectURL(file);
      currentImgName = file.name || "medical_image.png";

      imgbox.innerHTML = "";
      const img = document.createElement("img");
      img.src = currentImgUrl;
      img.alt = "医学图像预览";
      imgbox.appendChild(img);
    });

    document.getElementById("btnClearImg").onclick = () => {
      if (currentImgUrl) URL.revokeObjectURL(currentImgUrl);
      currentImgUrl = null;
      fileInput.value = "";
      setImgPlaceholder();
    };

    document.getElementById("btnDownloadImg").onclick = () => {
      if (!currentImgUrl) {
        alert("当前没有图像可下载");
        return;
      }
      const a = document.createElement("a");
      a.href = currentImgUrl;
      a.download = currentImgName;
      document.body.appendChild(a);
      a.click();
      a.remove();
    };

    // -----------------------------
    // 二维码：生成（当前网址编码）/ 下载
    // -----------------------------
    const qrbox = document.getElementById("qrbox");
    let currentQrUrl = null;

    function setQrPlaceholder(){
      qrbox.innerHTML = '<span class="small">未生成二维码</span>';
    }

    document.getElementById("btnGenQR").onclick = () => {
      const urlToEncode = window.location.href; // 将当前网址编码为QR码
      const qrImgSrc = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(urlToEncode)}`;

      currentQrUrl = qrImgSrc;
      qrbox.innerHTML = "";
      const img = document.createElement("img");
      img.src = qrImgSrc;
      img.alt = "访问二维码";
      qrbox.appendChild(img);
    };

    document.getElementById("btnDownloadQR").onclick = () => {
      if (!currentQrUrl) {
        alert("请先生成二维码");
        return;
      }
      const a = document.createElement("a");
      a.href = currentQrUrl;
      a.download = "qr_code.png";
      document.body.appendChild(a);
      a.click();
      a.remove();
    };

    // 初始化占位
    setImgPlaceholder();
    setQrPlaceholder();
  </script>
</body>
</html>
