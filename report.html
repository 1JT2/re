<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>医学影像诊断报告</title>
  <style>
    :root { --max: 1100px; }
    *{ box-sizing:border-box; }
    body{ margin:0; font-family: Arial, sans-serif; background:#f6f7f9; color:#111; }
    .topbar{ background:#fff; border-bottom:1px solid #e7e7e7; }
    .topbar .wrap{ max-width:var(--max); margin:0 auto; padding:14px 16px; display:flex; justify-content:space-between; gap:12px; align-items:center; }
    .wrap{ max-width:var(--max); margin:0 auto; padding:16px; }
    .btn{ padding:8px 10px; border-radius:10px; border:1px solid #d1d5db; background:#fff; cursor:pointer; width:100%; }
    .btn:hover{ background:#f3f7fb; }
    .badge{ font-size:12px; padding:4px 8px; border-radius:999px; background:#f1f1f1; }
    .grid2{ display:grid; grid-template-columns: 1fr; gap:12px; }
    @media (min-width: 900px){ .grid2{ grid-template-columns: 1.35fr 0.65fr; } }

    .card{ background:#fff; border:1px solid #e7e7e7; border-radius:12px; padding:14px 12px; box-shadow:0 2px 10px rgba(0,0,0,.04); }
    h1,h2{ margin:0; }
    .hblock{ text-align:center; padding:8px 0; }
    .info-line{ margin:6px 0; display:flex; gap:10px; flex-wrap:wrap; }
    .info-line strong{ min-width:110px; color:#555; font-weight:700; }
    .textblock{ white-space:pre-wrap; line-height:1.55; }
    .small{ font-size:12px; color:#555; }

    .imgbox{
      width:100%;
      aspect-ratio: 4/3;
      border:1px dashed #c6cdd6;
      border-radius:10px;
      background:#f6f8fa;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      position:relative;
    }
    .imgbox img{
      width:100%;
      height:100%;
      object-fit:contain;
      display:block;
    }

    .toolrow{
      display:grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap:8px;
      margin-top:10px;
    }
    @media (max-width: 480px){
      .toolrow{ grid-template-columns: 1fr; }
    }

    .filebtn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      border:1px solid #d1d5db;
      border-radius:10px;
      background:#fff;
      cursor:pointer;
      padding:8px 10px;
      user-select:none;
      width:100%;
    }
    .filebtn:hover{ background:#f3f7fb; }
    .filebtn input{ display:none; }

    .btn, .filebtn{
      font-size: 14px;
      line-height: 20px;
      font-weight: 600;
    }

    .qrbox{
      width:100%;
      aspect-ratio: 4/3;
      border:1px dashed #c6cdd6;
      border-radius:10px;
      background:#f6f8fa;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
    }
    .qrbox img{ width:100%; height:100%; object-fit:contain; display:block; }

    .editable{
      border:1px solid #d1d5db;
      border-radius:10px;
      padding:10px 12px;
      background:#fff;
      min-height: 110px;
      outline: none;
      white-space: pre-wrap;
      line-height: 1.55;
    }
    .readonly{
      background:#f9fafb;
      color:#333;
    }
    .editbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      margin-bottom:8px;
    }
    .status{
      font-size:12px;
      color:#555;
    }
    .input{
      width:100%;
      padding:10px 12px;
      border:1px solid #d1d5db;
      border-radius:10px;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="wrap">
      <div>
        <b>XUST医院云平台</b>
        <span class="badge">医学影像报告</span>
        <span class="badge" id="roleBadge">角色</span>
        <span class="badge" id="syncBadge">未同步</span>
      </div>
      <div>
        <button class="btn" id="btnLogout" style="width:auto;">退出</button>
      </div>
    </div>
  </div>

  <div class="wrap">
    <div class="hblock">
      <h2>医学影像诊断报告</h2>
      <div class="small">患者端会自动轮询云端数据；医生端可用 PAT 提交更新到 data/db.json。</div>
    </div>

    <div class="grid2">
      <div style="display:flex;flex-direction:column;gap:12px;">
        <div class="card">
          <div class="info-line"><strong>就诊号：</strong><span id="patient-id"></span></div>
          <div class="info-line"><strong>报告号：</strong><span id="report-id"></span></div>
          <div class="info-line"><strong>检查日期：</strong><span id="exam-date"></span></div>
        </div>

        <div class="card">
          <div class="info-line"><strong>患者：</strong><span id="patient-name"></span></div>
          <div class="info-line"><strong>性别/年龄：</strong><span id="gender-age"></span></div>
          <div class="info-line"><strong>主治医生：</strong><span id="doctor-name"></span></div>
          <div class="info-line"><strong>科室：</strong><span id="department"></span></div>
        </div>

        <div class="card">
          <div class="info-line"><strong>影像信息：</strong><span id="image-meta"></span></div>
          <div class="info-line"><strong>检查部位：</strong><span id="body-part"></span></div>
        </div>

        <div class="card">
          <div class="editbar">
            <div><b>诊断证明</b></div>
            <div class="status" id="diagStatus">—</div>
          </div>
          <div class="editable" id="diagnosis-proof" contenteditable="true"></div>
        </div>

        <div class="card">
          <div class="editbar">
            <div><b>医嘱</b></div>
            <div class="status" id="advStatus">—</div>
          </div>
          <div class="editable" id="medical-advice" contenteditable="true"></div>
        </div>

        <div class="card" id="doctorPanel" style="display:none;">
          <div class="editbar">
            <div><b>医生更新（云端提交）</b></div>
            <div class="status" id="saveStatus">需要 PAT</div>
          </div>
          <div class="small">PAT：Fine-grained token，权限 Contents=Read and write，仓库选择本项目。</div>
          <input class="input" id="pat" placeholder="github_pat_..." />
          <div class="toolrow" style="grid-template-columns:1fr 1fr;margin-top:10px;">
            <button class="btn" id="btnSaveCloud">保存到云端</button>
            <button class="btn" id="btnReload">从云端刷新</button>
          </div>
          <div class="small" id="err" style="color:#b00020;margin-top:8px;"></div>
        </div>
      </div>

      <div style="display:flex;flex-direction:column;gap:12px;">
        <div class="card">
          <div style="display:flex;justify-content:space-between;gap:10px;align-items:center;">
            <div><b>医学图像展示</b></div>
            <div class="small">支持上传本地图片预览</div>
          </div>

          <div class="imgbox" id="imgbox">
            <span class="small">未加载图像（可上传医学图像水印系统输出的医学图像）</span>
          </div>

          <div class="toolrow">
            <label class="filebtn">
              选择文件
              <input type="file" id="fileInput" accept="image/*"/>
            </label>
            <button class="btn" id="btnClearImg">清除图像</button>
            <button class="btn" id="btnDownloadImg">下载图像</button>
          </div>

          <hr style="border:none;border-top:1px solid #eee;margin:12px 0;">

          <div style="display:flex;justify-content:space-between;gap:10px;align-items:center;">
            <div><b>QR码展示</b></div>
            <div class="small">将当前网址编码为QR码</div>
          </div>

          <div class="qrbox" id="qrbox">
            <span class="small">未生成二维码</span>
          </div>

          <div class="toolrow" style="grid-template-columns:1fr 1fr;margin-top:10px;">
            <button class="btn" id="btnGenQR">生成图像</button>
            <button class="btn" id="btnDownloadQR">下载图像</button>
          </div>

          <div class="small" style="margin-top:10px;color:#555;"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ===== 0) 登录拦截 =====
    try{
      if (localStorage.getItem("logged_in") !== "1") location.href = "login.html";
    }catch(e){
      location.href = "login.html";
    }

    document.getElementById("btnLogout").onclick = () => {
      try{
        localStorage.removeItem("logged_in");
        localStorage.removeItem("role");
      }catch(e){}
      location.href = "login.html";
    };

    const role = (()=>{ try{return localStorage.getItem("role")||"patient";}catch(e){return "patient";} })();
    document.getElementById("roleBadge").textContent = role === "doctor" ? "医生" : "患者";

    // ===== 1) GitHub 云端配置（如有不同请修改）=====
    const OWNER = "1JT2";
    const REPO  = "re";
    const BRANCH = "main";
    const DB_PATH = "data/db.json";
    const POLL_MS = 4000;

    function nowMs(){ return Date.now(); }
    const urlParams = new URLSearchParams(window.location.search);
    const code = urlParams.get('code') || "001";

    const $ = (id)=>document.getElementById(id);
    const diagEl = $("diagnosis-proof");
    const advEl  = $("medical-advice");
    const diagStatus = $("diagStatus");
    const advStatus  = $("advStatus");
    const syncBadge  = $("syncBadge");

    async function loadDbRaw(){
      const url = `https://raw.githubusercontent.com/${OWNER}/${REPO}/${BRANCH}/${DB_PATH}?ts=${nowMs()}`;
      const res = await fetch(url, { cache: "no-store" });
      if(!res.ok) throw new Error("raw fetch failed");
      return await res.json();
    }

    async function ghGetFile(){
      const url = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${DB_PATH}?ref=${encodeURIComponent(BRANCH)}`;
      const res = await fetch(url, { headers: { "Accept":"application/vnd.github+json" } });
      if(!res.ok) throw new Error(`GET contents failed: ${res.status}`);
      return await res.json();
    }

    async function ghPutFile(token, message, contentText, sha){
      const url = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${DB_PATH}`;
      const body = {
      message,
      content: btoa(unescape(encodeURIComponent(contentText))),
      branch: BRANCH,
      sha
    };
      const res = await fetch(url, {
        method:"PUT",
        headers:{
          "Accept":"application/vnd.github+json",
          "Authorization":`Bearer ${token.trim()}`,
          "X-GitHub-Api-Version":"2022-11-28"
        },
        body: JSON.stringify(body)
      });
      
      if(!res.ok){
        const t = await res.text();
        // 把最关键的错误信息抛出去（页面会显示）
        throw new Error(`GitHub PUT failed: ${res.status} ${t}`);
      }
      return await res.json();
    }

    function setEditableForRole(){
      const isDoctor = (role === "doctor");
      $("doctorPanel").style.display = isDoctor ? "" : "none";

      diagEl.contentEditable = isDoctor ? "true" : "false";
      advEl.contentEditable = isDoctor ? "true" : "false";

      diagEl.classList.toggle("readonly", !isDoctor);
      advEl.classList.toggle("readonly", !isDoctor);

      diagStatus.textContent = isDoctor ? "可编辑（保存到云端）" : "只读（云端自动刷新）";
      advStatus.textContent  = isDoctor ? "可编辑（保存到云端）" : "只读（云端自动刷新）";
    }

    let lastUpdatedAt = 0;

    function fillReport(r){
      $("patient-id").textContent = r.patientId || `P-${code}`;
      $("report-id").textContent  = r.reportId  || `R-${code}`;
      $("exam-date").textContent  = r.examDate  || "—";

      $("patient-name").textContent = r.patientName || `患者${code}`;
      $("gender-age").textContent   = r.genderAge || "—";
      $("doctor-name").textContent  = r.doctorName || "—";
      $("department").textContent   = r.department || "—";

      $("image-meta").textContent = r.imageMeta || "—";
      $("body-part").textContent  = r.bodyPart || "—";

      diagEl.textContent = r.diagnosisProof || "";
      advEl.textContent  = r.medicalAdvice || "";
    }

    async function refreshFromCloud(){
      const db = await loadDbRaw();
      const report = (db.reports || []).find(x=>String(x.code)===String(code));
      if(!report){
        syncBadge.textContent = "未找到该code";
        return;
      }
      if((report.updatedAt||0) !== lastUpdatedAt){
        lastUpdatedAt = report.updatedAt || 0;
        fillReport(report);
        syncBadge.textContent = "已同步";
      }else{
        syncBadge.textContent = "无更新";
      }
    }

    // ===== 修复点：保存时输出“云端db里有哪些code”，找不到就自动创建 =====
    $("btnSaveCloud")?.addEventListener("click", async ()=>{
      $("err").textContent = "";
      try{
        const token = $("pat").value.trim();
        if(!token){ $("err").textContent="需要 PAT 才能提交"; return; }

        const file = await ghGetFile();
        const text = decodeURIComponent(escape(atob(file.content.replace(/\n/g,""))));
        const db = JSON.parse(text);

        // 诊断输出：实际读到的 codes
        const codes = Array.isArray(db.reports) ? db.reports.map(r=>String(r.code)) : [];
        console.log("Loaded codes from GitHub API:", codes);

        let reports = db.reports;
        if (!Array.isArray(reports)) {
          db.reports = [];
          reports = db.reports;
        }

        let report = reports.find(x=>String(x.code)===String(code));
        if(!report){
          // 自动创建（避免卡死）
          report = {
            code: String(code),
            patientId: `P-${code}`,
            reportId: `R-${code}`,
            examDate: "2025-07-10",
            patientName: `患者${code}`,
            genderAge: "男 / 45",
            doctorName: `张医生（工号 D-${code}）`,
            department: "胸外科",
            imageMeta: "CT，分辨率 512×512",
            bodyPart: "胸部",
            diagnosisProof: "",
            medicalAdvice: "",
            updatedAt: 0
          };
          reports.push(report);

          // 同时把提示写清楚：你读到的db里没有该code
          $("err").textContent = `提示：云端db中未找到 code=${code}，已自动创建。云端已有code：${codes.join(", ") || "（空）"}`;
        }

        report.diagnosisProof = diagEl.textContent;
        report.medicalAdvice  = advEl.textContent;
        report.updatedAt = nowMs();

        await ghPutFile(token, `Update report ${code}`, JSON.stringify(db, null, 2), file.sha);
        $("saveStatus").textContent = "提交成功";
        await refreshFromCloud();
      }catch(e){
        $("saveStatus").textContent = "提交失败";
        $("err").textContent = e && e.message ? e.message : "提交失败（未知错误）";
        console.error(e);
      }
    });

    $("btnReload")?.addEventListener("click", async ()=>{
      $("err").textContent = "";
      try{ await refreshFromCloud(); }catch(e){ $("err").textContent="刷新失败"; }
    });

    setEditableForRole();
    refreshFromCloud().catch(()=>{});
    setInterval(()=>{ refreshFromCloud().catch(()=>{}); }, POLL_MS);

    // -----------------------------
    // 通用：另存为（优先 showSaveFilePicker，失败则回退 a.download）
    // -----------------------------
    async function saveAsBlob(blob, filename) {
      if (window.showSaveFilePicker) {
        const ext = (filename.split(".").pop() || "png").toLowerCase();
        const mime =
          ext === "png" ? "image/png" :
          (ext === "jpg" || ext === "jpeg") ? "image/jpeg" :
          "application/octet-stream";

        const handle = await window.showSaveFilePicker({
          suggestedName: filename,
          types: [{
            description: "Image",
            accept: { [mime]: ["." + ext] }
          }]
        });

        const writable = await handle.createWritable();
        await writable.write(blob);
        await writable.close();
        return;
      }

      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    async function fetchToBlob(url) {
      const res = await fetch(url, { cache: "no-store" });
      if (!res.ok) throw new Error("下载失败");
      return await res.blob();
    }

    // -----------------------------
    // 医学图像：上传预览 / 清除 / 另存为下载（仍是本地预览，不写云端）
    // -----------------------------
    const fileInput = document.getElementById("fileInput");
    const imgbox = document.getElementById("imgbox");
    let currentImgUrl = null;
    let currentImgName = "medical_image.png";

    function setImgPlaceholder(){
      imgbox.innerHTML = '<span class="small">未加载图像（可上传医学图像水印系统输出的医学图像）</span>';
    }

    fileInput.addEventListener("change", () => {
      const file = fileInput.files && fileInput.files[0];
      if (!file) return;

      if (currentImgUrl) URL.revokeObjectURL(currentImgUrl);
      currentImgUrl = URL.createObjectURL(file);
      currentImgName = file.name || "medical_image.png";

      imgbox.innerHTML = "";
      const img = document.createElement("img");
      img.src = currentImgUrl;
      img.alt = "医学图像预览";
      imgbox.appendChild(img);
    });

    document.getElementById("btnClearImg").onclick = () => {
      if (currentImgUrl) URL.revokeObjectURL(currentImgUrl);
      currentImgUrl = null;
      fileInput.value = "";
      setImgPlaceholder();
    };

    document.getElementById("btnDownloadImg").onclick = async () => {
      try{
        if (!currentImgUrl) {
          alert("当前没有图像可下载");
          return;
        }
        const blob = await fetchToBlob(currentImgUrl);
        await saveAsBlob(blob, currentImgName || "medical_image.png");
      }catch(e){
        alert("下载失败（可能是浏览器不支持另存为或权限限制）");
      }
    };

    // -----------------------------
    // 二维码：生成（当前网址编码）/ 另存为下载
    // -----------------------------
    const qrbox = document.getElementById("qrbox");
    let currentQrUrl = null;

    function setQrPlaceholder(){
      qrbox.innerHTML = '<span class="small">未生成二维码</span>';
    }

    document.getElementById("btnGenQR").onclick = () => {
      const urlToEncode = window.location.href;
      const qrImgSrc = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(urlToEncode)}`;

      currentQrUrl = qrImgSrc;
      qrbox.innerHTML = "";
      const img = document.createElement("img");
      img.src = qrImgSrc;
      img.alt = "访问二维码";
      qrbox.appendChild(img);
    };

    document.getElementById("btnDownloadQR").onclick = async () => {
      try{
        if (!currentQrUrl) {
          alert("请先生成二维码");
          return;
        }
        const blob = await fetchToBlob(currentQrUrl);
        await saveAsBlob(blob, "qr_code.png");
      }catch(e){
        alert("下载失败（可能是浏览器不支持另存为或网络限制）");
      }
    };

    setImgPlaceholder();
    setQrPlaceholder();
  </script>
</body>
</html>
